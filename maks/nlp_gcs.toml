# GCS → NLP text pipeline (edit paths and run: uv run python maks/run_gcs_nlp.py)

[gcs]
bucket = "thesis_archive_bucket"
prefix = "dtu_findit/master_thesis"

[paths]
# Relative to the repository root (folder with pyproject.toml)
txt_dir = "maks/data/nlp_from_gcs_all"
manifest = "maks/data/manifest_nlp_gcs_full.csv"
jsonl = "maks/data/corpus_gcs_full.jsonl"

[run]
# Omit or set to null for all PDFs under prefix (requires a TOML file that supports null — we use -1 for "all" below)
max_pdfs = -1
max_workers = 8
clear_jsonl = true
resume = true
force_fresh = false
skip_if_empty = true
min_page_fraction_back_matter = 0.45

[policy]
# "keep_all" | "keep_first_fraction"
type = "keep_all"
fallback_fraction = 0.95
