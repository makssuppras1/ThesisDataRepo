# Stage-2 clustering: metadata (parquet) + NLP text files from disk.
# Run from repo root:
#   uv sync --group analysis
#   thesis-cluster run --config maks/analysis_config.toml

[paths]
corpus_source = "txt_dir"
corpus_jsonl = ""
metadata_csv = "data/data_analysis_files/df_filtered_final_96pct_grades_excl_2026_20042026.parquet"
metadata_sep = ";"
output_dir = "maks/data/analysis_out"
nlp_txt_dir = "maks/data/nlp_from_gcs_all"
# txt filenames are ``{member_id_ss}_{title...}.txt`` — join id = segment before first '_'
corpus_txt_id_mode = "member_prefix"
# Keep only theses present in both the parquet and a .txt file
inner_join_metadata = true
faculty_csv = ""

[columns]
id = "member_id_ss"
# Leave empty when corpus ids match ``member_id_ss`` directly (use with member_prefix)
corpus_join = ""
abstract = "MASTER THESIS TITLE"
publisher = "Author"
year = "Publication Year"
faculty = "Department_new"
title = "MASTER THESIS TITLE"

[embedding]
source = "corpus"
model = "sentence-transformers/all-mpnet-base-v2"
chunked = true
# Token windows (model tokenizer), 10–20% overlap, mean pool — aligned with common IR/RAG practice.
# Windows are clamped to the model max length (all-mpnet-base-v2 is often ~384 tokens in sentence-transformers).
chunk_unit = "tokens"
chunk_max_tokens = 768
chunk_overlap_ratio = 0.15
chunk_pooling = "mean"
prefer_single_embedding = true
# Legacy: only if chunk_unit = "chars"
chunk_size = 1600
chunk_overlap = 200
first_chunk_weight = 2.0
last_chunk_weight = 1.5
middle_chunk_weight = 1.0
min_text_chars = 50
sample_size = 0
sample_seed = 42
use_cache = true

[umap]
n_neighbors = 15
min_dist = 0.1
metric = "cosine"
random_state = 42

[cluster]
method = "hdbscan"
hdbscan_min_cluster_size = 30
hdbscan_min_samples = 10
kmeans_n_clusters = 20
agglomerative_n_clusters = 20

[tfidf]
max_features = 5000
min_df = 2
top_n = 15

[tsne]
perplexities = [30.0, 50.0]
random_state = 42

[evolution]
labels_csv = ""
