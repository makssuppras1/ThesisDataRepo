let checked = {};
try { checked = JSON.parse(localStorage.getItem('ld_checked') || '{}'); } catch(e) {}

function updateProgress() {
  const total = data.flatMap(p => p.tasks).length;
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('done-count').textContent = done;
  document.getElementById('pct').textContent = Math.round(done/total*100) + '%';
}

function render() {
  const container = document.getElementById('phases');
  container.innerHTML = '';

  data.forEach(phase => {
    const phaseEl = document.createElement('div');
    phaseEl.className = `phase ${phase.id}`;

    const doneInPhase = phase.tasks.filter(t => checked[`${phase.id}_${t.title}`]).length;
    const pct = Math.round(doneInPhase / phase.tasks.length * 100);

    phaseEl.innerHTML = `
      <div class="phase-label">
        <span class="phase-tag">${phase.label}</span>
        <span class="phase-name">${phase.name}</span>
        <span class="phase-desc">${phase.desc} · ${doneInPhase}/${phase.tasks.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="tasks" style="margin-top:10px;" id="tasks_${phase.id}"></div>
    `;

    container.appendChild(phaseEl);

    const tasksEl = phaseEl.querySelector(`#tasks_${phase.id}`);
    phase.tasks.forEach(task => {
      const key = `${phase.id}_${task.title}`;
      const isDone = !!checked[key];

      const taskEl = document.createElement('div');
      taskEl.className = `task`;

      const filesHTML = task.files.map(f => `
        <div class="file-item">
          <code>${f.path}</code>
          ${f.note ? `<span>${f.note}</span>` : ''}
        </div>`).join('');

      const stepsHTML = task.steps.map(s => `<div class="step">${s}</div>`).join('');
      const criteriaHTML = task.criteria.map(c => `<div class="criterion">${c}</div>`).join('');
      const tagsHTML = task.tags.map(t => `<span class="tag">${t}</span>`).join('');

      taskEl.innerHTML = `
        <div class="task-header">
          <div class="task-check ${isDone ? 'done' : ''}" data-key="${key}"></div>
          <span class="task-title">${task.title}</span>
          <div class="task-meta">${tagsHTML}</div>
          <span class="expand-icon">▾</span>
        </div>
        <div class="task-body">
          <section>
            <h4>Files to create</h4>
            <div class="file-list">${filesHTML}</div>
          </section>
          <section>
            <h4>Implementation steps</h4>
            <div class="steps">${stepsHTML}</div>
          </section>
          <section>
            <h4>Acceptance criteria</h4>
            <div class="criteria">${criteriaHTML}</div>
          </section>
          <section>
            <h4>Cursor prompt</h4>
            <div class="prompt-block">${task.prompt}</div>
          </section>
        </div>
      `;

      taskEl.querySelector('.task-header').addEventListener('click', (e) => {
        if (e.target.closest('.task-check')) return;
        taskEl.classList.toggle('open');
      });

      taskEl.querySelector('.task-check').addEventListener('click', (e) => {
        e.stopPropagation();
        checked[key] = !checked[key];
        try { localStorage.setItem('ld_checked', JSON.stringify(checked)); } catch(e) {}
        render();
        updateProgress();
      });

      tasksEl.appendChild(taskEl);
    });

    if (phase.id !== 'p5') {
      const div = document.createElement('div');
      div.className = 'divider';
      container.appendChild(div);
    }
  });

  updateProgress();
}

render();
</script>
