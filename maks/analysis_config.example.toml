# Copy to e.g. maks/analysis_config.toml and edit paths/columns.
# Run: uv sync --group analysis
#      thesis-cluster run --config maks/analysis_config.toml

[paths]
corpus_jsonl = "maks/data/corpus_gcs_full.jsonl"
metadata_csv = "maks/data/metadata.csv"
metadata_sep = ";"
output_dir = "maks/data/analysis_out"
# Optional: only keep JSONL rows that have a matching ``{id}.txt`` here (same names as GCS NLP output)
nlp_txt_dir = "maks/data/nlp_from_gcs_all"
# Optional: faculty / department join (same id column as metadata)
faculty_csv = ""

[columns]
id = "member_id_ss"
abstract = "abstract_ts"
publisher = "Publisher"
year = "year"
faculty = "Department_new"
# Optional: prepended to chunks (corpus mode) or to abstract string
title = ""

[embedding]
# corpus = use JSONL "text" merged on id; abstract = use metadata abstract column
source = "corpus"
model = "sentence-transformers/all-mpnet-base-v2"
chunked = true
chunk_size = 1600
chunk_overlap = 200
first_chunk_weight = 2.0
last_chunk_weight = 1.5
middle_chunk_weight = 1.0
min_text_chars = 50
sample_size = 0
sample_seed = 42
# Reuse fulltext_embeddings_*.npy / abstract_embeddings_*.npy when present
use_cache = false

[umap]
n_neighbors = 15
min_dist = 0.1
metric = "cosine"
random_state = 42

[cluster]
method = "hdbscan"
hdbscan_min_cluster_size = 15
hdbscan_min_samples = 5
kmeans_n_clusters = 15
agglomerative_n_clusters = 15

[tfidf]
max_features = 5000
min_df = 2
top_n = 15

[tsne]
perplexities = [30.0, 50.0]
random_state = 42

# Second stage: thesis-cluster evolution --config …
[evolution]
# Leave empty to use output_dir/clustering_labels.csv
labels_csv = ""
# Optional: restrict to years >= this (integer)
# min_year = 2010
