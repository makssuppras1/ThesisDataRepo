[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "thesisdatarepo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "google-cloud-storage>=3.0.0",
    "gsutil>=5.36",
    "pypdf>=6.9.2",
]

[dependency-groups]
dev = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["maks/thesisdatarepo"]

[tool.pytest.ini_options]
pythonpath = ["maks", "."]
testpaths = ["maks/tests"]
